<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yellow Satin Jacket</title>
    <link rel="icon" type="image/png" href="./boo-favicon.png">
    <link rel="apple-touch-icon" href="./apple-touch-icon-squish.png">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-yellow: #FFDD66;
            --hover-yellow: #FFE88A;
            --shadow-color: rgba(0, 0, 0, 0.8);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body, html {
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            font-family: 'VT323', monospace;
        }

        /* Fullscreen Background Layer System */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            background-color: #050505;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: opacity 1.25s ease, transform 2s cubic-bezier(0.23, 1, 0.32, 1), filter 1.25s ease;
        }

        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        video {
            display: block;
        }

        body.intro-active .background-container {
            opacity: 0.18;
            transform: scale(1.08);
            filter: saturate(0.72) brightness(0.7);
        }

        body.intro-open .background-container {
            opacity: 1;
            transform: scale(1);
            filter: saturate(1);
        }

        /* The blurred "ambiance" layer */
        .bg-blur {
            filter: blur(40px) brightness(0.6);
            opacity: 0.8;
            transform: scale(1.1); /* Prevent blur bleed at edges */
        }

        /* The clear "cinematic" layer */
        .bg-clear {
            position: relative;
            object-fit: cover; /* Changed from contain to full-screen as requested */
            height: 100%;
            width: 100%;
            z-index: 2;
        }
        
        @media (max-width: 768px) {
            .bg-desktop-stack { display: none; }
            .bg-mobile { 
                display: block; 
                position: absolute;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                object-fit: cover;
                /* 
                   Scale the image by 1.7x to completely fill frame.
                */
                transform: scale(1.7);
                transform-origin: center center;
                object-position: 20% 90%; 
            }
        }
        @media (min-width: 769px) {
            .bg-mobile { display: none; }
            .bg-desktop-stack { 
                display: flex; 
                width: 100%;
                height: 100%;
                align-items: center;
                justify-content: center;
            }
        }

        /* Subtle Dim Overlay to help text pop */
        .dim-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.3); 
            pointer-events: none;
            z-index: 3;
        }

        /* Grain Overlay for Retro CRT Effect */
        .grain-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('./assets/silly/ysj-grain.gif');
            opacity: 0.15;
            pointer-events: none;
            z-index: 3;
            mix-blend-mode: multiply;
        }

        /* Subtle scanline effect */
        .scanlines {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                to bottom,
                rgba(255, 255, 255, 0),
                rgba(255, 255, 255, 0) 50%,
                rgba(0, 0, 0, 0.1) 50%,
                rgba(0, 0, 0, 0.1)
            );
            background-size: 100% 4px;
            pointer-events: none;
            z-index: 4;
        }

        .opening-mask {
            position: fixed;
            inset: 0;
            z-index: 40;
            pointer-events: none;
            overflow: hidden;
        }

        .opening-mask-bar {
            position: absolute;
            left: 0;
            width: 100%;
            height: 50.5vh;
            background: #000;
            transition: height 2.35s cubic-bezier(0.19, 1, 0.22, 1);
        }

        .opening-mask-top {
            top: 0;
            border-bottom: 1px solid rgba(255, 234, 92, 0.14);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.55);
        }

        .opening-mask-bottom {
            bottom: 0;
            border-top: 1px solid rgba(255, 234, 92, 0.14);
            box-shadow: 0 -16px 40px rgba(0, 0, 0, 0.55);
        }

        .opening-mask-centerline {
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 234, 92, 0.72), rgba(255, 243, 173, 0.88), rgba(255, 234, 92, 0.72), transparent);
            transform: translateY(-50%);
            opacity: 0.96;
            box-shadow:
                0 0 10px rgba(255, 234, 92, 0.32),
                0 0 30px rgba(255, 234, 92, 0.14);
            transition: opacity 0.8s ease;
        }

        .opening-mask-centerline::after {
            content: "";
            position: absolute;
            inset: -8px 0;
            background: linear-gradient(90deg, transparent, rgba(255, 234, 92, 0.08), transparent);
            filter: blur(10px);
        }

        body.intro-open .opening-mask-bar {
            height: 0;
        }

        body.intro-open .opening-mask-centerline {
            opacity: 0;
        }

        body.intro-finished .opening-mask {
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.45s ease, visibility 0s linear 0.45s;
        }

        .intro-status {
            position: fixed;
            left: 50%;
            bottom: clamp(2.2rem, 8vh, 4.25rem);
            transform: translateX(-50%);
            z-index: 45;
            display: flex;
            align-items: center;
            gap: 0.4rem;
            color: rgba(255, 234, 92, 0.86);
            text-transform: uppercase;
            letter-spacing: 0.14em;
            font-size: clamp(1.1rem, 1.4vw, 1.35rem);
            text-shadow:
                0 0 8px rgba(255, 234, 92, 0.3),
                0 0 18px rgba(255, 234, 92, 0.12);
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.4s ease, visibility 0s linear 0.4s;
            pointer-events: none;
        }

        body.intro-active:not(.intro-open) .intro-status {
            opacity: 1;
            visibility: visible;
            transition-delay: 0.18s;
        }

        .intro-status-label {
            white-space: nowrap;
        }

        .intro-status-dots {
            display: inline-flex;
            min-width: 1.8em;
            justify-content: flex-start;
        }

        .intro-status-dots span {
            opacity: 0.18;
            animation: introDotPulse 1.2s steps(1, end) infinite;
        }

        .intro-status-dots span:nth-child(2) {
            animation-delay: 0.2s;
        }

        .intro-status-dots span:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes introDotPulse {
            0%, 20% { opacity: 0.18; }
            40% { opacity: 0.45; }
            60%, 100% { opacity: 1; }
        }


        
        /* Flash Event Animation (Triggered by Play) */
        .flash-animation {
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: #000;
            pointer-events: none;
            opacity: 0;
            display: none;
            overflow: hidden;
        }

        .flash-animation-media {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .flash-animation.flash {
            display: block;
            animation: flashIn 0.8s ease-out forwards;
        }
        .flash-animation.trailer-flash.flash {
            animation: trailerFlashIn 0.95s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        .flash-animation.contact-flash.flash {
            animation: contactFlashIn 0.9s cubic-bezier(0.23, 1, 0.32, 1) forwards;
        }
        @keyframes flashIn {
            0% { opacity: 0; transform: scale(1.1); filter: brightness(2) contrast(2) hue-rotate(-20deg); }
            10% { opacity: 1; filter: brightness(1.2) contrast(1.5); }
            30% { opacity: 1; transform: scale(1.05); }
            100% { opacity: 0; transform: scale(1); filter: brightness(0); }
        }
        @keyframes trailerFlashIn {
            0% { opacity: 0; transform: scale(1.08); filter: blur(2px) brightness(1.7) saturate(1.2); }
            14% { opacity: 1; filter: blur(0px) brightness(1.12) saturate(1.05); }
            40% { opacity: 0.98; transform: scale(1.03); }
            100% { opacity: 0; transform: scale(1); filter: blur(7px) brightness(0.18); }
        }
        @keyframes contactFlashIn {
            0% { opacity: 0; transform: scale(1.06); filter: blur(3px) brightness(1.8) hue-rotate(-10deg); }
            12% { opacity: 1; filter: blur(0px) brightness(1.08); }
            36% { opacity: 1; transform: scale(1.02); }
            100% { opacity: 0; transform: scale(1); filter: blur(9px) brightness(0.12); }
        }

        /* Main Container for Content */
        .content {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            height: 100%;
            padding-top: 10vh;
        }

        /* Title Logo & Glitch Group */
        .title-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: min(92vw, 760px);
            z-index: 10;
            transition: opacity 0.95s ease, transform 1.15s cubic-bezier(0.23, 1, 0.32, 1), filter 0.8s ease;
        }

        .title-logo-shell {
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 0.25rem;
        }

        .title-logo {
            width: min(100%, 500px);
            aspect-ratio: 16 / 9;
            height: auto;
            display: block;
            margin-inline: auto;
            object-fit: contain;
            filter: drop-shadow(0 0 15px rgba(245, 224, 39, 0.4));
            transform: scale(1);
            background: transparent;
        }

        .title-logo-source {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0;
            pointer-events: none;
            clip-path: inset(50%);
        }

        .title-logo-fallback {
            display: none;
        }

        body.use-title-fallback .title-logo-source,
        body.use-title-fallback #titleLogoCanvas {
            display: none;
        }

        body.use-title-fallback .title-logo-fallback {
            display: block;
        }

        /* Navigation Menu */
        .nav-menu {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.95rem;
            margin-top: clamp(5.3rem, 12.5vh, 7.2rem);
            transition: opacity 0.75s ease, transform 0.95s cubic-bezier(0.23, 1, 0.32, 1), filter 0.75s ease;
        }

        body.intro-active .title-group,
        body.intro-active .nav-menu {
            opacity: 0;
            transform: translateY(34px) scale(0.96);
            filter: blur(12px);
            visibility: hidden;
        }

        body.intro-logo-visible .title-group {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
            visibility: visible;
        }

        body.intro-active .nav-menu {
            pointer-events: none;
        }

        body.intro-menu-visible .nav-menu {
            opacity: 1;
            transform: translateY(0);
            filter: blur(0);
            visibility: visible;
            pointer-events: auto;
        }

        .nav-link {
            text-decoration: none;
            color: var(--primary-yellow);
            font-family: inherit;
            font-size: clamp(2rem, 2.8vw, 2.3rem);
            font-weight: normal;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            text-shadow: 
                4px 4px 0 #000,
                0px 0px 10px rgba(245, 224, 39, 0.9),
                0px 0px 20px rgba(245, 224, 39, 0.6);
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .nav-link:hover, .nav-link:focus {
            color: var(--hover-yellow);
            transform: scale(1.05);
            text-shadow: 
                4px 4px 0 #000,
                0px 0px 15px rgba(255, 243, 116, 1),
                0px 0px 30px rgba(255, 243, 116, 0.8),
                0px 0px 50px rgba(255, 243, 116, 0.6);
            outline: none;
        }

        .nav-link:active {
            transform: scale(0.95);
        }

        /* Base Modal Styles */
        .modal {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal.open {
            display: flex;
        }

        /* Base Modal Backdrop styles */
        .modal-backdrop {
            position: absolute;
            inset: 0;
            opacity: 0;
            transition: opacity 1.5s ease;
            overflow: hidden;
            background: #000;
        }

        .modal-backdrop-media {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        #trailerModal .modal-backdrop {
            filter: blur(15px);
            transform: scale(1.1); /* Prevent blurred edges from leaking */
            transition: opacity 1.5s ease, filter 0.8s ease, transform 0.9s ease;
        }
        #contactModal .modal-backdrop {
            filter: blur(10px);
            transform: scale(1.1); /* Prevent blur bleed */
            transition: opacity 1.5s ease, filter 0.8s ease, transform 0.9s ease;
        }
        .modal.open .modal-backdrop {
            opacity: 1;
        }
        #trailerModal.open .modal-backdrop {
            filter: blur(12px) brightness(0.9);
            transform: scale(1.06);
        }
        #contactModal.send-burst .modal-backdrop {
            filter: blur(14px) brightness(1.05) saturate(1.08);
            animation: contactBackdropBurst 1.15s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #trailerModal .modal-backdrop::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.7); /* Deeply dim the trailer loop */
        }
        #contactModal .modal-backdrop::after {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.4); /* Lightly dim the contact loop */
        }
        @keyframes contactBackdropBurst {
            0% {
                transform: scale(1.12);
                filter: blur(16px) brightness(0.86) saturate(0.94);
            }
            28% {
                transform: scale(1.06);
                filter: blur(10px) brightness(1.1) saturate(1.16);
            }
            100% {
                transform: scale(1.08);
                filter: blur(13px) brightness(1) saturate(1.04);
            }
        }

        /* Modal Box Frame */
        .modal-box {
            position: relative;
            z-index: 1;
            width: min(900px, 100%);
            border: 2px solid var(--primary-yellow);
            box-shadow: 0 0 30px rgba(245, 224, 39, 0.3);
            background: rgba(0,0,0,0.85);
            /* Entry animation */
            opacity: 0;
            transform: scale(0.95);
            transition: all 0.6s ease;
        }
        /* Reveal instantly when flash is triggered */
        .modal.open .modal-box {
            opacity: 1;
            transform: scale(1);
        }

        /* Close Button */
        .modal-close {
            position: absolute;
            top: -40px;
            right: 0;
            font-family: inherit;
            font-size: 1.5rem;
            font-weight: normal;
            letter-spacing: 0.1em;
            color: var(--primary-yellow);
            background: transparent;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #000;
        }
        .modal-close:hover {
            color: var(--hover-yellow);
            text-shadow: 0 0 10px var(--primary-yellow);
        }
        .modal-action {
            position: absolute;
            top: -40px;
            font-family: inherit;
            font-size: 1.5rem;
            font-weight: normal;
            letter-spacing: 0.1em;
            color: var(--primary-yellow);
            background: transparent;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            text-shadow: 2px 2px 0 #000;
        }
        .modal-action:hover {
            color: var(--hover-yellow);
            text-shadow: 0 0 10px var(--primary-yellow);
        }
        .modal-action-left {
            left: 0;
        }

        /* Slow Letterbox Video Setup */
        .video-wrap {
            position: relative;
            aspect-ratio: 16 / 9;
            background: #000;
            overflow: hidden;
            clip-path: inset(50% 0 50% 0);
            transition: clip-path 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }
        #trailerModal.open .video-wrap {
            clip-path: inset(0 0 0 0);
        }
        .video-wrap iframe {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* Contact Form Styles */
        #contactModal .modal-box {
            border: none;
            box-shadow: none;
            background: transparent;
            width: min(980px, calc(100vw - 1.75rem));
            max-height: min(88vh, 900px);
            overflow-y: auto;
            overflow-x: hidden;
            padding-right: 0.2rem;
            -webkit-mask-image: linear-gradient(to bottom, black calc(100% - 3rem), transparent 100%);
            mask-image: linear-gradient(to bottom, black calc(100% - 3rem), transparent 100%);
        }
        #contactModal .modal-box.at-bottom {
            -webkit-mask-image: none;
            mask-image: none;
        }
        #contactModal .modal-close {
            color: #ff2a9d;
            text-shadow: 2px 2px 0 #10103b;
        }
        #contactModal .modal-close:hover {
            color: #FFDD66;
            text-shadow: 0 0 10px #FFDD66;
        }
        .contact-form {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            padding: clamp(1rem, 1.5vw, 1.25rem) clamp(1rem, 1.5vw, 1.25rem) 1.75rem;
            font-family: inherit;
            background:
                linear-gradient(180deg, rgba(25, 22, 73, 0.96), rgba(12, 11, 38, 0.96)),
                url('./assets/silly/ysj-grain.gif');
            background-size: cover, 200px 200px;
            background-blend-mode: normal, soft-light;
            border: 2px solid #ff2a9d; /* Hot Pink */
            box-shadow: 0 0 25px rgba(255, 42, 157, 0.5);
            color: #FFDD66; /* Yellow text */
            border-radius: 18px 8px 18px 8px;
            position: relative;
            isolation: isolate;
            overflow: visible;
        }
        .contact-form::before,
        .contact-form::after {
            content: "";
            position: absolute;
            inset: -8px;
            border-radius: 22px 10px 22px 10px;
            pointer-events: none;
            z-index: -1;
            opacity: 0.55;
            mix-blend-mode: screen;
        }
        .contact-form::before {
            border: 1px solid rgba(255, 234, 0, 0.65);
            transform: translate(-4px, 2px);
            box-shadow:
                0 0 28px rgba(255, 234, 0, 0.18),
                inset 0 0 20px rgba(255, 234, 0, 0.06);
        }
        .contact-form::after {
            border: 1px solid rgba(72, 255, 163, 0.52);
            transform: translate(4px, -2px);
            box-shadow:
                0 0 32px rgba(72, 255, 163, 0.14),
                inset 0 0 18px rgba(72, 255, 163, 0.05);
        }
        .contact-form h2 {
            font-family: inherit;
            font-size: clamp(1.8rem, 2.5vw, 2.1rem);
            font-weight: normal;
            text-align: left;
            letter-spacing: 0.1em;
            color: #FFDD66;
            text-shadow: 2px 2px 0 #000;
            margin-bottom: 0.2rem;
            line-height: 0.95;
            text-transform: uppercase;
        }
        .contact-form h2.big-header {
            font-size: clamp(2.15rem, 3.8vw, 2.45rem);
            margin-top: 0.55rem;
        }
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.2rem;
            margin-bottom: 0.2rem;
            min-width: 0;
        }
        .form-group label {
            font-size: 0.95rem;
            font-weight: normal;
            letter-spacing: 0.05em;
            text-transform: uppercase;
            color: #ff2a9d; /* Hot pink subheaders */
            line-height: 1;
        }

        /* Budget Toggle System */
        .budget-toggle-group {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 0.55rem;
            width: 100%;
        }
        .budget-btn {
            background:
                linear-gradient(180deg, rgba(8, 6, 24, 0.9), rgba(2, 2, 10, 0.94)),
                url('./assets/silly/ysj-grain.gif');
            background-size: cover, 180px 180px;
            background-blend-mode: normal, screen;
            border: 1px solid #ff2a9d;
            color: #FFDD66;
            font-family: inherit;
            font-size: clamp(1rem, 1.7vw, 1.15rem);
            padding: 0.72rem 0.3rem;
            cursor: pointer;
            text-transform: uppercase;
            transition: all 0.3s ease;
            min-width: 0;
            line-height: 1;
            border-radius: 12px 4px 12px 4px;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.04),
                inset 0 0 28px rgba(30, 255, 226, 0.05);
        }
        .budget-btn.active {
            background: #FFDD66;
            color: #000;
            box-shadow: 0 0 15px #FFDD66;
        }
        .budget-btn:hover:not(.active) {
            box-shadow: 0 0 10px rgba(255, 42, 157, 0.5);
        }
        .form-row {
            display: flex;
            gap: 0.8rem;
        }
        .form-row .form-group {
            flex: 1;
        }

        .form-input, .form-textarea, .form-select {
            background:
                linear-gradient(180deg, rgba(6, 6, 20, 0.9), rgba(1, 1, 8, 0.94)),
                url('./assets/silly/ysj-grain.gif');
            background-size: cover, 180px 180px;
            background-blend-mode: normal, screen;
            border: 1px solid #ff2a9d; /* Hot pink */
            color: #f5f7ff;
            font-family: inherit;
            font-size: clamp(1.15rem, 1.8vw, 1.35rem);
            font-weight: normal;
            padding: 0.8rem 0.9rem;
            outline: none;
            transition: box-shadow 0.3s ease;
            width: 100%;
            min-width: 0;
            border-radius: 14px 5px 14px 5px;
            box-shadow:
                inset 0 0 0 1px rgba(255, 255, 255, 0.03),
                inset 0 0 24px rgba(0, 255, 240, 0.035);
            caret-color: #f5f7ff;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.08);
        }
        .form-input:focus, .form-textarea:focus, .form-select:focus {
            box-shadow:
                0 0 15px rgba(255, 42, 157, 0.45),
                inset 0 0 0 1px rgba(255, 255, 255, 0.06),
                inset 0 0 26px rgba(0, 255, 240, 0.06);
        }
        .form-input::placeholder,
        .form-textarea::placeholder {
            color: rgba(255, 234, 0, 0.58);
        }
        .form-input:-webkit-autofill,
        .form-input:-webkit-autofill:hover,

    <script>
        const TRAILER_URL = 'https://player.vimeo.com/video/1161209754?h=a9410cc12b&badge=0&autopause=0&autoplay=0&player_id=0&app_id=58479&title=0&byline=0&portrait=0&color=FFDD66&dnt=1';
        const HERO_CLEAR_URL = './assets/optimized/ysj-animation-social-intro-color.mp4';
        const HERO_BLUR_URL = './assets/optimized/ysj-animation-mixed-intro-loop.mp4';
        const TITLE_FALLBACK_FRAMES = [
            './assets/optimized/ysj-title-fallback-clean.png',
            './assets/optimized/ysj-title-fallback-clean.png',
            './assets/optimized/ysj-title-fallback-01.png',
            './assets/optimized/ysj-title-fallback-02.png',

        const CONTACT_BACKDROP_URL = './assets/optimized/ysj-animation-mixed-close-up.mp4';
        const END_BURST_URL = './assets/optimized/ysj-animation-mixed-end.mp4';

        const trailerModal  = document.getElementById('trailerModal');
        const trailerFrame  = document.getElementById('trailerFrame');
        const trailerVideoWrap = document.getElementById('trailerVideoWrap');
        const trailerBackdropVideo = document.getElementById('trailerBackdropVideo');

        let vimeoPlayer = null;

        function initVimeoPlayer() {
            if (!window.Vimeo || !trailerFrame) return;
            if (vimeoPlayer) { vimeoPlayer.destroy().catch(() => {}); }
            vimeoPlayer = new Vimeo.Player(trailerFrame);

            vimeoPlayer.ready().then(() => vimeoPlayer.pause()).catch(() => {});

        const playBtn       = document.getElementById('playBtn');
        
        const contactModal  = document.getElementById('contactModal');

        const contactBtn    = document.getElementById('contactBtn');
        
        const flashAnim     = document.getElementById('flashAnimation');
        const flashVideo    = document.getElementById('flashVideo');
        const bgBlurVideo   = document.getElementById('bgBlurVideo');
        const bgClearVideo  = document.getElementById('bgClearVideo');
        const bgMobileVideo = document.getElementById('bgMobileVideo');
        const titleLogo     = document.getElementById('titleLogo');
        const titleLogoCanvas = document.getElementById('titleLogoCanvas');
        const titleLogoFallback = document.getElementById('titleLogoFallback');
        const titleLogoContext = titleLogoCanvas?.getContext('2d', { alpha: true, willReadFrequently: true });
        let titleRenderStarted = false;
        let titleFallbackTimer = null;
        const useStaticTitleFallback = (() => {
            const ua = navigator.userAgent || '';
            const isIOSDevice = /iP(hone|od|ad)/i.test(ua) || (navigator.platform === 'MacIntel' && navigator.maxTouchPoints > 1);
            const isWebKitFamily = /WebKit/i.test(ua);
            return isIOSDevice && isWebKitFamily;
        })();

        if (useStaticTitleFallback) {
            document.body.classList.add('use-title-fallback');
            if (titleLogoFallback) {
                titleLogoFallback.src = TITLE_FALLBACK_FRAMES[0];
            }
        }

        function ensureVideoSource(videoEl, src, shouldLoop = true) {
            if (!videoEl || !src) return;
            if (videoEl.dataset.src !== src) {
                videoEl.src = src;
                videoEl.dataset.src = src;
                videoEl.load();
            }
            videoEl.loop = shouldLoop;
        }

        function playVideo(videoEl, { reset = false } = {}) {
            if (!videoEl) return;
            if (reset) videoEl.currentTime = 0;
            if (videoEl === titleLogo) {
                videoEl.playbackRate = 1;
            }
            videoEl.play().catch(() => {});
        }

        function pauseAndClearVideo(videoEl, { clear = false } = {}) {
            if (!videoEl) return;
            videoEl.pause();
            if (clear) {
                videoEl.removeAttribute('src');
                delete videoEl.dataset.src;
                videoEl.load();
            }
        }

        function waitForVideoReady(videoEl) {
            if (!videoEl) return Promise.resolve();
            if (videoEl.readyState >= 2) {
                if (typeof videoEl.requestVideoFrameCallback === 'function') {
                    return new Promise((resolve) => {
                        videoEl.requestVideoFrameCallback(() => resolve());
                    });
                }
                return Promise.resolve();
            }

            return new Promise((resolve) => {
                let settled = false;
                const done = () => {
                    if (settled) return;
                    settled = true;
                    videoEl.removeEventListener('loadeddata', done);
                    videoEl.removeEventListener('canplay', done);
                    videoEl.removeEventListener('playing', done);
                    videoEl.removeEventListener('error', done);
                    resolve();
                };

                videoEl.addEventListener('loadeddata', done, { once: true });
                videoEl.addEventListener('canplay', done, { once: true });
                videoEl.addEventListener('playing', done, { once: true });
                videoEl.addEventListener('error', done, { once: true });
            });
        }

        function syncTitleCanvasSize() {
            if (!titleLogoCanvas || !titleLogo) return;
            const nextWidth = titleLogo.videoWidth || 800;
            const nextHeight = titleLogo.videoHeight || 450;
            if (titleLogoCanvas.width !== nextWidth || titleLogoCanvas.height !== nextHeight) {
                titleLogoCanvas.width = nextWidth;
                titleLogoCanvas.height = nextHeight;
            }
        }

        function drawTitleFrame() {
            if (!titleLogo || !titleLogoCanvas || !titleLogoContext || titleLogo.readyState < 2) return;

            syncTitleCanvasSize();
            const frameWidth = titleLogoCanvas.width;
            const frameHeight = titleLogoCanvas.height;

            titleLogoContext.clearRect(0, 0, frameWidth, frameHeight);
            titleLogoContext.drawImage(titleLogo, 0, 0, frameWidth, frameHeight);

            const frame = titleLogoContext.getImageData(0, 0, frameWidth, frameHeight);
            const { data } = frame;

            for (let i = 0; i < data.length; i += 4) {
                const red = data[i];
                const green = data[i + 1];
                const blue = data[i + 2];
                const min = Math.min(red, green, blue);
                const max = Math.max(red, green, blue);
                const spread = max - min;

                if (min > 222 && spread < 16) {
                    data[i + 3] = 0;
                    continue;
                }

                if (min > 196 && spread < 22) {
                    data[i + 3] = Math.min(data[i + 3], 92);
                }
            }

            titleLogoContext.putImageData(frame, 0, 0);
        }

        function startTitleCanvasRender() {
            if (titleRenderStarted || !titleLogo) return;
            titleRenderStarted = true;

            if (typeof titleLogo.requestVideoFrameCallback === 'function') {
                const render = () => {
                    drawTitleFrame();
                    titleLogo.requestVideoFrameCallback(render);
                };
                titleLogo.requestVideoFrameCallback(render);
                return;
            }

            const render = () => {
                drawTitleFrame();
                if (!titleLogo.paused && !titleLogo.ended) {
                    requestAnimationFrame(render);
                } else {
                    titleRenderStarted = false;
                }
            };

            requestAnimationFrame(render);
        }

        function startTitleFallbackAnimation() {
            if (!useStaticTitleFallback || !titleLogoFallback) return;
            if (titleFallbackTimer) clearInterval(titleFallbackTimer);

            let frameIndex = 0;
            const preloadFrames = TITLE_FALLBACK_FRAMES.map((src) => {
                const img = new Image();
                img.src = src;
                return img;
            });

            const applyFrame = () => {
                titleLogoFallback.src = TITLE_FALLBACK_FRAMES[frameIndex];
                frameIndex = (frameIndex + 1) % TITLE_FALLBACK_FRAMES.length;
            };

            applyFrame();
            titleFallbackTimer = setInterval(applyFrame, 520);

            if (preloadFrames.length) {
                titleLogoFallback.decoding = 'async';
            }
        }

        function triggerScreenFlash(assetUrl, variant) {
            flashAnim.classList.remove('flash', 'trailer-flash', 'contact-flash');
            void flashAnim.offsetWidth;
            ensureVideoSource(flashVideo, assetUrl, false);
            playVideo(flashVideo, { reset: true });
            if (variant) flashAnim.classList.add(variant);
            flashAnim.classList.add('flash');
        }

        async function startOpeningSequence() {
            ensureVideoSource(bgBlurVideo, HERO_BLUR_URL, true);
            ensureVideoSource(bgClearVideo, HERO_CLEAR_URL, true);
            ensureVideoSource(bgMobileVideo, HERO_CLEAR_URL, true);
            playVideo(bgBlurVideo);
            playVideo(bgClearVideo);
            playVideo(bgMobileVideo);
            if (!useStaticTitleFallback) {
                playVideo(titleLogo);
                drawTitleFrame();
                startTitleCanvasRender();
            } else {
                startTitleFallbackAnimation();
            }

            const heroVideos = window.matchMedia('(max-width: 768px)').matches
                ? (useStaticTitleFallback ? [bgMobileVideo] : [bgMobileVideo, titleLogo])
                : (useStaticTitleFallback ? [bgBlurVideo, bgClearVideo] : [bgBlurVideo, bgClearVideo, titleLogo]);

            await Promise.race([
                Promise.all(heroVideos.map(waitForVideoReady)),
                new Promise((resolve) => setTimeout(resolve, 4200))
            ]);

            requestAnimationFrame(() => {
                requestAnimationFrame(() => {
                    document.body.classList.add('intro-open');
                });
            });

            setTimeout(() => {
                document.body.classList.add('intro-logo-visible');
            }, 1550);

            setTimeout(() => {
                document.body.classList.add('intro-menu-visible');
            }, 2450);

            setTimeout(() => {
                document.body.classList.add('intro-finished');
            }, 3350);
        }

        startOpeningSequence();

        // Play Trailer logic
        function openTrailerModal(e) {
            if (e) e.preventDefault();
            
            // 1. Trigger the trailer flash animation
            triggerScreenFlash(END_BURST_URL, 'contact-flash');
            ensureVideoSource(trailerBackdropVideo, TRAILER_BACKDROP_URL, true);
            playVideo(trailerBackdropVideo, { reset: true });
            
            // 2. Open modal almost immediately to pop-up behind flash
            setTimeout(() => {
                trailerFrame.src = TRAILER_URL;
                trailerModal.classList.add('open');
                document.body.style.overflow = 'hidden';
                setVolumeUI(true); // assume muted until proven otherwise
                initVimeoPlayer();
            }, 50);
            
            // 3. Clean up the flash class
            setTimeout(() => {
                flashAnim.classList.remove('flash', 'contact-flash');
                pauseAndClearVideo(flashVideo);
            }, 1200);
        }

        function closeTrailerModal() {
            trailerModal.classList.remove('open');
            trailerFrame.src = '';
            document.body.style.overflow = '';
            pauseAndClearVideo(trailerBackdropVideo, { clear: true });
            if (vimeoPlayer) { vimeoPlayer.destroy().catch(() => {}); vimeoPlayer = null; }
        }

        async function openTrailerFullscreen(e) {
            if (e) e.preventDefault();

            const target = trailerFrame || trailerVideoWrap;
            if (!target) return;

            try {
                if (target.requestFullscreen) {
                    await target.requestFullscreen();
                    return;
                }
                if (trailerVideoWrap && trailerVideoWrap.requestFullscreen) {
                    await trailerVideoWrap.requestFullscreen();
                    return;
                }
                if (target.webkitRequestFullscreen) {
                    target.webkitRequestFullscreen();
                    return;
                }
                if (trailerVideoWrap && trailerVideoWrap.webkitRequestFullscreen) {
                    trailerVideoWrap.webkitRequestFullscreen();
                }
            } catch (err) {
                console.warn('Fullscreen request failed', err);
            }
        }

        // Contact Modal logic
        const contactForm = document.getElementById('contactForm');
        const sendFlareBtn = document.getElementById('sendFlareBtn');

        const contactModalBox = contactModal.querySelector('.modal-box');
        if (contactModalBox) {
            contactModalBox.addEventListener('scroll', () => {
                const atBottom = contactModalBox.scrollHeight - contactModalBox.scrollTop <= contactModalBox.clientHeight + 8;
                contactModalBox.classList.toggle('at-bottom', atBottom);
            });
        }

        function openContactModal(e) {
            if (e) e.preventDefault();

            // 1. Trigger the flash animation with 'End' asset
            triggerScreenFlash(END_BURST_URL, 'contact-flash');
            ensureVideoSource(contactBackdropVideo, CONTACT_BACKDROP_URL, true);
            playVideo(contactBackdropVideo, { reset: true });

            // 2. Open modal
            setTimeout(() => {
                contactModal.classList.remove('send-burst');
                contactModal.classList.add('open');
                document.body.style.overflow = 'hidden';
                // Check if content fits without scrolling
                if (contactModalBox) {
                    const atBottom = contactModalBox.scrollHeight <= contactModalBox.clientHeight + 8;
                    contactModalBox.classList.toggle('at-bottom', atBottom);
                }
            }, 50);
            
            // 3. Clean up the flash class
            setTimeout(() => {
                flashAnim.classList.remove('flash', 'contact-flash');
                pauseAndClearVideo(flashVideo);
            }, 1200);
        }

        function closeContactModal() {
            contactModal.classList.remove('open');
            contactModal.classList.remove('send-burst');
            document.body.style.overflow = '';
            pauseAndClearVideo(contactBackdropVideo, { clear: true });
        }

        // Budget Toggle Logic
        function setBudget(btn) {
            document.querySelectorAll('.budget-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            document.getElementById('budget_val').value = btn.getAttribute('data-value');
        }

        if(contactForm) {
            contactForm.addEventListener('submit', (e) => {
                e.preventDefault(); // Stop immediate simple submission to let the glitch play
                sendFlareBtn.classList.add('glitch-click');
                sendFlareBtn.textContent = 'MESSAGE SENT!';
                contactModal.classList.remove('send-burst');
                void contactModal.offsetWidth;
                contactModal.classList.add('send-burst');
                ensureVideoSource(contactBackdropVideo, END_BURST_URL, true);
                playVideo(contactBackdropVideo, { reset: true });
                
                setTimeout(() => {
                    sendFlareBtn.classList.remove('glitch-click');
                    
                    const name = document.getElementById('name').value;
                    const email = document.getElementById('email').value;
                    const message = document.getElementById('message').value;
                    const budget = document.getElementById('budget_val').value || 'Not specified';
                    
                    const subject = encodeURIComponent("Website Contact from " + name);
                    const body = encodeURIComponent(
                        "Dream Project / How I can help:\n" + message + 
                        "\n\nBudget: " + budget +
                        "\nFrom: " + name + 
                        "\nEmail: " + email
                    );
                    
                    window.location.href = `mailto:mk@yellowsatinjacket.com?subject=${subject}&body=${body}`;
                    
                    setTimeout(() => {
                        sendFlareBtn.textContent = 'SEND CORRESPONDANCE';
                        contactModal.classList.remove('send-burst');
                        ensureVideoSource(contactBackdropVideo, CONTACT_BACKDROP_URL, true);
                        closeContactModal();
                        contactForm.reset();
                    }, 1000);
                    
                }, 400); // glitch duration
            });
        }

        // Event Listeners
        playBtn.addEventListener('click', openTrailerModal);
        playBtn.addEventListener('keydown', (e) => { if (e.key === 'Enter') openTrailerModal(e); });
        if (fullscreenBtn) {
            fullscreenBtn.addEventListener('click', openTrailerFullscreen);
            fullscreenBtn.addEventListener('keydown', (e) => { if (e.key === 'Enter') openTrailerFullscreen(e); });
        }

        contactBtn.addEventListener('click', openContactModal);
        contactBtn.addEventListener('keydown', (e) => { if (e.key === 'Enter') openContactModal(e); });

        // Escape to close active modals
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                if (trailerModal.classList.contains('open')) closeTrailerModal();
                if (contactModal.classList.contains('open')) closeContactModal();
            }
        });
        
        // Click on backdrop to close
        document.querySelectorAll('.modal-backdrop').forEach(bd => {
            bd.addEventListener('click', () => {
                if (trailerModal.classList.contains('open')) closeTrailerModal();
                if (contactModal.classList.contains('open')) closeContactModal();
            });
        });
    </script>
</body>
</html>
