  <style>
    @font-face {
      font-family: 'NCLOutline';
      src: url('./NCLNeovibes-Outline.otf') format('opentype');
    }

    @font-face {
      font-family: 'NCLNeoRegular';
      src: url('./NCLNeovibes-Regular.otf') format('opentype');
    }

    :root {
      --neon: #FFDD66;
      --warm-light: #ffc766;
      --cool-light: #74b9ff;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      height: 100vh;
      position: relative;
      overflow: hidden;
      background-color: #000;
    }

    .hero {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
      background: #1C1C1C;
      isolation: isolate;
      transform-origin: center center;
      transition: transform 8000ms cubic-bezier(0.1, 0.82, 0.18, 1);
    }

    .hero.cta-push {
      transform: scale(1.02);
    }

    .bg-img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      filter: brightness(0.96) contrast(1.04) saturate(0.96);
    }

    .mobile {
      display: none;
    }

    @media (max-width: 768px) {
      .desktop {
        display: none;
      }

      .mobile {
        display: block;
      }

      .neon-wrapper {
        padding: 0.18em 0.34em 0.26em 0.34em;
      }

      .neon-link {
        letter-spacing: 0.09em;
      }

      .lightbox {
        padding: 12px;
      }

      .lightbox-dialog {
        width: min(96vw, 700px);
      }

      .lightbox-close {
        top: -36px;
        padding: 7px 10px;
        font-size: 0.82rem;
      }

      .pw-modal {
        padding: 14px;
      }

      .pw-dialog {
        width: min(95vw, 560px);
        padding: 18px 16px;
      }

      .pw-title {
        margin-bottom: 10px;
        letter-spacing: 0.08em;
        font-size: clamp(1rem, 4.8vw, 1.35rem);
      }

      .pw-line {
        letter-spacing: 0.05em;
        font-size: clamp(0.95rem, 4.2vw, 1.2rem);
        line-height: 1.35;
        word-break: break-word;
      }

      .pw-line.is-loading {
        letter-spacing: 0.14em;
      }

      .sound-toggle {
        left: 50%;
        right: auto;
        top: 14px;
        transform: translateX(-50%);
        padding: 8px 14px;
        font-size: 0.92rem;
      }
    }

    @media (max-width: 420px) {
      .pw-modal {
        padding: 10px;
      }

      .pw-dialog {
        width: 96vw;
        padding: 16px 12px;
      }

      .pw-title {
        font-size: clamp(0.95rem, 5.1vw, 1.2rem);
      }

      .pw-line {
        font-size: clamp(0.9rem, 4.8vw, 1.08rem);
        letter-spacing: 0.04em;
      }

      .sound-toggle {
        width: min(88vw, 220px);
        text-align: center;
      }
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at 50% 45%,
          rgba(0, 0, 0, 0.0) 0%,
          rgba(0, 0, 0, 0.42) 75%);
      pointer-events: none;
    }

    .letterbox-reveal {
      position: fixed;
      inset: 0;
      z-index: 60;
      pointer-events: none;
    }

    .letterbox-bar {
      position: absolute;
      left: 0;
      width: 100%;
      height: 50vh;
      background: #000;
      transform: translateY(0);
      will-change: transform;
      animation: letterboxOpen 2200ms cubic-bezier(0.25, 0.95, 0.2, 1) 180ms forwards;
    }

    .letterbox-bar.top {
      top: 0;
      transform-origin: top;
    }

    .letterbox-bar.bottom {
      bottom: 0;
      transform-origin: bottom;
      animation-name: letterboxOpenBottom;
    }

    .vhs-static {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 0;
      z-index: 8;
      background-image:
        repeating-radial-gradient(circle at 20% 30%, rgba(255, 255, 255, 0.2) 0 1px, transparent 1px 3px),
        repeating-radial-gradient(circle at 70% 60%, rgba(255, 255, 255, 0.16) 0 1px, transparent 1px 3px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.04), rgba(0, 0, 0, 0.04));
      background-size: 220px 220px, 180px 180px, 100% 100%;
      mix-blend-mode: screen;
      animation:
        staticShift 0.18s steps(2) infinite,
        glitchPulse 8.2s linear infinite;
    }

    .glitch-gif {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 12;
      opacity: 0;
      background-image: url('./glitch-overlay.gif');
      background-size: cover;
      background-position: center;
      mix-blend-mode: screen;
      animation:
        glitchDrift 6s linear infinite,
        glitchPulseHeavy 8.2s linear infinite;
    }

    .glitch-video-overlay {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      pointer-events: none;
      z-index: 14;
      mix-blend-mode: screen;
      opacity: 0;
      transition: opacity 80ms linear;
    }

    .glitch-video-overlay.is-active {
      opacity: 0.22;
    }

    .neon-wrapper {
      position: absolute;
      top: 50%;
      left: 53%;
      transform: translate(-50%, -50%);
      font-size: 84px;
      letter-spacing: 0.12em;
      text-align: center;
      filter: none;
      z-index: 6;
      opacity: 1;
      mix-blend-mode: screen;
      padding: 0.19em 0.48em 0.30em 0.48em;
      border-radius: 0.14em;
      border: 1px solid rgba(255, 221, 102, 0.38);
      background: rgba(0, 0, 0, 0.62);
      box-shadow:
        inset 0 0 0.24em rgba(255, 221, 102, 0.08),
        0 0 0.9em rgba(255, 221, 102, 0.11),
        0 0 2.1em rgba(255, 221, 102, 0.06),
        0 0 3.8em rgba(255, 221, 102, 0.03);
      animation: wrapperFlicker 7s infinite;
    }

    .neon-wrapper:hover,
    .neon-wrapper:focus-within {
      mix-blend-mode: screen;
      animation: none;
      background: rgba(0, 0, 0, 0.72);
      border-color: rgba(255, 221, 102, 0.95);
      box-shadow:
        inset 0 0 0.55em rgba(255, 221, 102, 0.22),
        0 0 1.9em rgba(255, 221, 102, 0.26),
        0 0 4.8em rgba(255, 221, 102, 0.12),
        0 0 9.0em rgba(255, 221, 102, 0.05);
    }

    .neon-wrapper::after {
      content: "";
      position: absolute;
      inset: 0.08em;
      border: 1px solid rgba(232, 232, 232, 0.2);
      border-radius: 0.1em;
      pointer-events: none;
    }

    .neon-link {
      position: relative;
      display: inline-block;
      text-decoration: none;
      cursor: pointer;
      line-height: 1;
      transform: scaleY(1.34);
      transform-origin: center;
      animation: flicker 6s infinite;
      white-space: nowrap;
      padding-bottom: 0.38em;
    }

    .neon-link::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0.24em;
      top: calc(100% - 0.02em);
      height: 0.055em;
      border-radius: 999px;
      background: #ff4db5;
      pointer-events: none;
      animation: lineFlicker 4.2s 0.3s infinite;
    }

    .neon-link::before {
      content: "";
      position: absolute;
      top: calc(100% - 0.11em);
      right: 0;
      width: 0;
      height: 0;
      border-top: 0.11em solid transparent;
      border-bottom: 0.11em solid transparent;
      border-left: 0.22em solid #ff4db5;
      pointer-events: none;
      animation: arrowFlicker 3.5s 1.4s infinite;
    }

    .neon-fill {
      font-family: 'NCLNeoRegular';
      color: transparent;
      background: none;
      -webkit-background-clip: initial;
      background-clip: initial;
      text-shadow: none;
      mix-blend-mode: normal;
      transition: color 180ms ease, text-shadow 180ms ease, filter 180ms ease;
    }

    .neon-link .char {
      display: inline-block;
      transition: opacity 90ms linear, filter 90ms linear, text-shadow 90ms linear;
    }

    .neon-link .char-space {
      width: 0.34em;
    }

    .neon-link .char.is-flicker-off {
      opacity: 0.12;
      filter: brightness(0.72);
      text-shadow: none !important;
    }

    .neon-outline {
      position: absolute;
      top: 0;
      left: 0;
      font-family: 'NCLOutline';
      color: #E8E8E8;
      pointer-events: none;
      animation: outlineFlicker 5s 0.8s infinite;
    }

    .light-spill {
      position: absolute;
      top: 52%;
      left: 53%;
      transform: translate(-50%, -50%);
      width: 70%;
      height: 18%;
      background: radial-gradient(ellipse at center,
          rgba(253, 214, 102, 0.2) 0%,
          rgba(253, 214, 102, 0.1) 35%,
          rgba(253, 214, 102, 0.03) 64%,
          transparent 100%);
      mix-blend-mode: overlay;
      pointer-events: none;
      z-index: 5;
    }

    /* ── Hover / glow-on: kill flickers, blast to full brightness ── */
    .neon-link:hover,
    .neon-link:focus-visible,
    .neon-link:active,
    .neon-link.glow-on {
      mix-blend-mode: screen;
      outline: none;
    }

    .neon-link:hover .neon-fill,
    .neon-link:focus-visible .neon-fill,
    .neon-link:active .neon-fill,
    .neon-link.glow-on .neon-fill {
      color: #FFDD66;
      text-shadow:
        0 0 3px rgba(255, 244, 196, 0.74),
        0 0 12px rgba(255, 221, 102, 0.48),
        0 0 30px rgba(255, 221, 102, 0.24),
        0 0 62px rgba(255, 221, 102, 0.1);
      filter: brightness(1.08) saturate(1.03);
    }

    .neon-link:hover .neon-outline,
    .neon-link:focus-visible .neon-outline,
    .neon-link:active .neon-outline,
    .neon-link.glow-on .neon-outline {
      animation: none;
      color: #FFDD66;
      opacity: 1;
      text-shadow:
        0 0 2px rgba(255, 255, 255, 0.82),
        0 0 8px rgba(255, 244, 196, 0.48),
        0 0 22px rgba(255, 221, 102, 0.24),
        0 0 56px rgba(255, 221, 102, 0.09);
    }

    .neon-link:hover::after,
    .neon-link:focus-visible::after,
    .neon-link:active::after,
    .neon-link.glow-on::after {
      animation: none;
      box-shadow:
        0 0 4px rgba(255, 77, 181, 1.0),
        0 0 14px rgba(255, 77, 181, 0.9),
        0 0 28px rgba(255, 77, 181, 0.55);
    }

    .neon-link:hover::before,
    .neon-link:focus-visible::before,
    .neon-link:active::before,
    .neon-link.glow-on::before {
      animation: none;
      filter:
        drop-shadow(0 0 3px rgba(255, 77, 181, 1.0)) drop-shadow(0 0 10px rgba(255, 77, 181, 0.85));
    }

    .lightbox {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.84);
      z-index: 20;
      padding: 24px;
    }

    .lightbox.is-open {
      display: grid;
    }

    .lightbox-dialog {
      width: min(92vw, 1100px);
      aspect-ratio: 16 / 9;
      background: #000;
      border: 1px solid rgba(255, 46, 159, 0.45);
      box-shadow:
        0 0 12px rgba(255, 46, 159, 0.55),
        0 0 38px rgba(255, 46, 159, 0.32);
      position: relative;
    }

    .lightbox-frame {
      width: 100%;
      height: 100%;
      border: 0;
    }

    .lightbox-close {
      position: absolute;
      top: -42px;
      right: 0;
      border: 1px solid rgba(255, 255, 255, 0.6);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-family: 'NCLNeoRegular', sans-serif;
      letter-spacing: 0.08em;
      padding: 7px 11px;
      cursor: pointer;
    }

    .lightbox-close:hover,
    .lightbox-close:focus-visible {
      border-color: var(--neon);
      box-shadow: 0 0 10px rgba(255, 46, 159, 0.45);
      outline: none;
    }

    .pw-modal {
      position: fixed;
      inset: 0;
      display: none;
      place-items: center;
      background: rgba(0, 0, 0, 0.86);
      z-index: 30;
      padding: 24px;
    }

    .pw-modal.is-open {
      display: grid;
    }

    .pw-dialog {
      width: min(92vw, 760px);
      background: #050505;
      border: 1px solid rgba(255, 46, 159, 0.45);
      box-shadow:
        0 0 12px rgba(255, 46, 159, 0.55),
        0 0 38px rgba(255, 46, 159, 0.32);
      padding: 28px 30px;
    }

    .pw-title {
      margin: 0 0 12px;
      font-family: 'NCLNeoRegular', sans-serif;
      color: #E8E8E8;
      letter-spacing: 0.1em;
      font-size: clamp(1.2rem, 2.2vw, 1.8rem);
    }

    .pw-line {
      margin: 0;
      font-family: 'NCLNeoRegular', sans-serif;
      color: #FFDD66;
      letter-spacing: 0.08em;
      font-size: clamp(1.1rem, 2vw, 1.6rem);
      min-height: 1.4em;
      text-shadow:
        0 0 4px rgba(255, 244, 196, 0.95),
        0 0 14px rgba(255, 221, 102, 0.7),
        0 0 30px rgba(255, 221, 102, 0.45);
    }

    .pw-line.is-loading {
      letter-spacing: 0.22em;
      color: rgba(232, 232, 232, 0.92);
      text-shadow:
        0 0 3px rgba(255, 255, 255, 0.7),
        0 0 9px rgba(255, 255, 255, 0.3);
    }

    .sound-toggle {
      position: fixed;
      top: 18px;
      right: 18px;
      z-index: 55;
      border: 1px solid rgba(255, 255, 255, 0.8);
      background: rgba(0, 0, 0, 0.62);
      color: #fff;
      padding: 8px 12px;
      cursor: pointer;
      font-family: 'NCLNeoRegular', sans-serif;
      letter-spacing: 0.08em;
      transition: border-color 180ms ease, box-shadow 180ms ease, color 180ms ease, opacity 180ms ease;
    }

    .sound-toggle:hover,
    .sound-toggle:focus-visible {
      border-color: var(--neon);
      box-shadow: 0 0 12px rgba(255, 221, 102, 0.45);
      outline: none;
    }

    .sound-toggle.is-on {
      border-color: rgba(255, 221, 102, 0.95);
      color: #FFDD66;
      box-shadow:
        0 0 10px rgba(255, 221, 102, 0.42),
        0 0 22px rgba(255, 221, 102, 0.2);
    }

    .sound-toggle.is-off {
      border-color: rgba(255, 255, 255, 0.35);
      color: rgba(232, 232, 232, 0.55);
      box-shadow: none;
      opacity: 0.72;
    }

    .sound-toggle.is-hidden {
      display: none;
    }

    .silly-overlay {
      position: fixed;
      inset: 0;
      display: none;
      z-index: 40;
      background: #050505;
      overflow: hidden;
    }

    .silly-overlay.is-open {
      display: block;
    }

    .silly-bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.84;
    }

    .silly-dim {
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at center, transparent 25%, rgba(0, 0, 0, 0.6) 100%);
    }

    .silly-title {
      position: absolute;
      left: 50%;
      bottom: 10%;
      transform: translateX(-50%);
      margin: 0;
      font-family: 'NCLNeoRegular', sans-serif;
      font-size: clamp(2rem, 8vw, 6rem);
      letter-spacing: 0.1em;
      color: #ff4db5;
      text-shadow: 0 0 10px rgba(255, 77, 181, 0.9), 0 0 28px rgba(255, 77, 181, 0.46);
      z-index: 2;
    }

    .silly-exit {
      position: absolute;
      top: 18px;
      right: 18px;
      z-index: 3;
      border: 1px solid rgba(255, 255, 255, 0.8);
      background: rgba(0, 0, 0, 0.55);
      color: #fff;
      padding: 8px 12px;
      cursor: pointer;
      font-family: 'NCLNeoRegular', sans-serif;
      letter-spacing: 0.08em;
    }

    .silly-exit:hover,
    .silly-exit:focus-visible {
      border-color: #ff4db5;
      box-shadow: 0 0 12px rgba(255, 77, 181, 0.45);
      outline: none;
    }

    @keyframes flicker {

      0%,
      14%,
      16%,
      32%,
      34%,
      62%,
      64%,
      100% {
        opacity: 1;
      }

      15%,
      33%,
      63% {
        opacity: 0.88;
      }
    }


    /* Box border — glow pulses on/off, border always faintly visible */
    @keyframes wrapperFlicker {

      0%,
      17%,
      21%,
      54%,
      58%,
      81%,
      85%,
      100% {
        border-color: rgba(255, 221, 102, 0.55);
        box-shadow:
          inset 0 0 0.4em rgba(255, 221, 102, 0.22),
          0 0 0.9em rgba(255, 221, 102, 0.38),
          0 0 2.2em rgba(255, 221, 102, 0.14);
      }

      19% {
        border-color: rgba(255, 221, 102, 0.14);
        box-shadow: none;
      }

      56% {
        border-color: rgba(255, 221, 102, 0.10);
        box-shadow: none;
      }

      83% {
        border-color: rgba(255, 221, 102, 0.08);
        box-shadow: none;
      }
    }


    /* White stroke — glow blinks, text always visible so it reads at rest */
    @keyframes outlineFlicker {

      0%,
      27%,
      31%,
      62%,
      66%,
      100% {
        opacity: 1;
        text-shadow:
          0 0 3px rgba(255, 255, 255, 1.0),
          0 0 10px rgba(255, 255, 255, 0.90),
          0 0 24px rgba(232, 232, 232, 0.70),
          0 0 48px rgba(255, 221, 102, 0.40),
          0 0 80px rgba(255, 221, 102, 0.18);
      }

      29% {
        opacity: 0.72;
        text-shadow: none;
      }

      64% {
        opacity: 0.68;
        text-shadow: none;
      }
    }


    /* Pink underline — glow blinks hard, line stays faint when off */
    @keyframes lineFlicker {

      0%,
      37%,
      41%,
      73%,
      77%,
      100% {
        box-shadow:
          0 0 4px rgba(255, 77, 181, 1.0),
          0 0 14px rgba(255, 77, 181, 0.90),
          0 0 30px rgba(255, 77, 181, 0.55);
        opacity: 1;
      }

      39% {
        box-shadow: none;
        opacity: 0.28;
      }

      75% {
        box-shadow: none;
        opacity: 0.22;
      }
    }


    /* Pink arrow — fastest blink, offset from line */
    @keyframes arrowFlicker {

      0%,
      34%,
      38%,
      69%,
      73%,
      100% {
        filter:
          drop-shadow(0 0 3px rgba(255, 77, 181, 1.0)) drop-shadow(0 0 12px rgba(255, 77, 181, 0.90));
        opacity: 1;
      }

      36% {
        filter: none;
        opacity: 0.30;
      }

      71% {
        filter: none;
        opacity: 0.25;
      }
    }

    @keyframes staticShift {
      0% {
        background-position: 0 0, 0 0, 0 0;
      }

      50% {
        background-position: 12px -8px, -10px 7px, 0 0;
      }

      100% {
        background-position: -8px 10px, 9px -12px, 0 0;
      }
    }

    @keyframes glitchDrift {
      0% {
        background-position: center;
      }

      50% {
        background-position: 52% 48%;
      }

      100% {
        background-position: center;
      }
    }

    @keyframes glitchPulse {
      0%,
      89%,
      100% {
        opacity: 0;
      }
      90% {
        opacity: 0.08;
      }
      91% {
        opacity: 0.16;
      }
      92% {
        opacity: 0.04;
      }
      93% {
        opacity: 0.12;
      }
      94% {
        opacity: 0;
      }
    }

    @keyframes glitchPulseHeavy {
      0%,
      89%,
      100% {
        opacity: 0;
      }
      90% {
        opacity: 0.06;
      }
      91% {
        opacity: 0.12;
      }
      92% {
        opacity: 0.03;
      }
      93% {
        opacity: 0.09;
      }
      94% {
        opacity: 0;
      }
    }

    @keyframes letterboxOpen {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(-100%);
      }
    }

    @keyframes letterboxOpenBottom {
      from {
        transform: translateY(0);
      }
      to {
        transform: translateY(100%);
      }
    }
  </style>
</head>

<body>
  <div class="letterbox-reveal" aria-hidden="true">
    <div class="letterbox-bar top"></div>
    <div class="letterbox-bar bottom"></div>
  </div>
  <div class="hero">
    <img src="./bg_desktop_fast.webp" class="bg-img desktop" alt="" />
    <img src="./bg_mobile_fast.webp" class="bg-img mobile" alt="" />
    <div class="light-spill" aria-hidden="true"></div>

    <div class="neon-wrapper">
      <a class="neon-link" href="https://vimeo.com/1161209754/a9410cc12b?share=copy&fl=sv&fe=ci" aria-label="Play trailer"
        data-lightbox-trigger>
        <span class="neon-fill">PLAY TRAILER</span>
        <span class="neon-outline">PLAY TRAILER</span>
      </a>
    </div>
  </div>

  <div class="vhs-static" aria-hidden="true"></div>
  <div class="glitch-gif" aria-hidden="true"></div>
  <video class="glitch-video-overlay" id="glitchVideo" playsinline preload="auto" muted>
    <source src="./assets/glitchy/Glitchy_01.mov" type="video/quicktime">
  </video>
  <div class="lightbox" id="trailerLightbox" aria-hidden="true">
    <div class="lightbox-dialog" role="dialog" aria-modal="true" aria-label="YSJ trailer video">
      <button class="lightbox-close" type="button" aria-label="Close trailer">CLOSE</button>
      <iframe class="lightbox-frame" id="trailerFrame" title="YSJ Trailer" src=""
        allow="autoplay; fullscreen; picture-in-picture" allowfullscreen></iframe>
    </div>
  </div>

  <div class="pw-modal" id="pwModal" aria-hidden="true">
    <div class="pw-dialog" role="dialog" aria-modal="true" aria-label="Trailer password">
      <h3 class="pw-title">ACCESS CHECK</h3>
      <p class="pw-line" id="pwLine"></p>
    </div>
  </div>

  <button class="sound-toggle" id="soundToggle" type="button" aria-pressed="false">SOUND OFF</button>

  <audio id="ambientAudio" preload="auto" loop>
    <source src="./assets/SFX/ES_Ambience, Scifi, Space Atmosphere, Dark, Creepy, Resonant - Epidemic Sound.wav" type="audio/wav">
  </audio>
  <audio id="typingAudio" preload="auto">
    <source src="./assets/SFX/ES_Computers, Keyboard & Mouse, Keyboard, Apple Magic, Typing, Moderate - Epidemic Sound.wav" type="audio/wav">
  </audio>
  <audio id="completeAudio" preload="auto">
    <source src="./assets/SFX/ES Voice Data Transfer Complete.wav" type="audio/wav">
  </audio>
  <audio id="clickAudio" preload="auto">
    <source src="./assets/SFX/ES_Computers, Keyboard & Mouse, Apple Magic Mouse Double Click - Epidemic Sound.wav" type="audio/wav">
  </audio>
  <audio id="swellAudio" preload="auto">
    <source src="./assets/SFX/ES_Magic, Angelic, Swell, Peaceful, Shimmer, Chime 10 - Epidemic Sound.wav" type="audio/wav">
  </audio>
  <audio id="fluorescentAudio" preload="auto">
    <source src="./assets/SFX/ES_Electricity, Misc, Fluorescent Light, Neon Tube, Turned On, Off, Melodic Noise - Epidemic Sound.wav" type="audio/wav">
  </audio>
  <audio id="glitchBurstAudio" preload="auto">
    <source src="./assets/glitchy/Glitchy_01.mov" type="video/quicktime">
  </audio>

  <section class="silly-overlay" id="sillyOverlay" aria-hidden="true">
    <img class="silly-bg" src="./assets/silly_bg.gif" alt="" />
    <div class="silly-dim"></div>
    <button class="silly-exit" type="button" id="sillyExit">EXIT SILLY MODE</button>
    <h2 class="silly-title">SILLY MODE</h2>
  </section>

  <script>
    const hero = document.querySelector('.hero');
    const desktopBg = document.querySelector('.bg-img.desktop');
    const mobileBg = document.querySelector('.bg-img.mobile');
    const neonWrapper = document.querySelector('.neon-wrapper');
    const lightSpill = document.querySelector('.light-spill');
    const trigger = document.querySelector('[data-lightbox-trigger]');
    const lightbox = document.getElementById('trailerLightbox');
    const closeButton = document.querySelector('.lightbox-close');
    const frame = document.getElementById('trailerFrame');
    const pwModal = document.getElementById('pwModal');
    const pwLine = document.getElementById('pwLine');
    const soundToggle = document.getElementById('soundToggle');
    const ambientAudio = document.getElementById('ambientAudio');
    const typingAudio = document.getElementById('typingAudio');
    const completeAudio = document.getElementById('completeAudio');
    const clickAudio = document.getElementById('clickAudio');
    const swellAudio = document.getElementById('swellAudio');
    const fluorescentAudio = document.getElementById('fluorescentAudio');
    const glitchVideo = document.getElementById('glitchVideo');
    const glitchBurstAudio = document.getElementById('glitchBurstAudio');
    const sillyOverlay = document.getElementById('sillyOverlay');
    const sillyExit = document.getElementById('sillyExit');
    const embedUrl = 'https://player.vimeo.com/video/1161209754?h=a9410cc12b&autoplay=1';
    const pin = {
      desktop: { x: 0.51, y: 0.485 },
      mobile: { x: 0.51, y: 0.485 },
      spillYOffset: 0.02,
      fontScaleDesktop: 0.105,
      fontScaleMobile: 0.074,
      fontMinDesktop: 54,
      fontMaxDesktop: 155,
      fontMinMobile: 20,
      fontMaxMobile: 72,
      shelfWidthDesktop: 0.76,
      shelfWidthMobile: 0.84,
      shelfHeightDesktop: 0.14,
      shelfHeightMobile: 0.16
    };
    let soundEnabled = true;
    let ambientPrimed = false;
    let typingTimer = null;
    let glitchTimer = null;
    let clickSfxTimer = null;
    let flickerTimer = null;
    let flickerActive = false;

    function getActiveBg() {
      const desktopVisible = window.getComputedStyle(desktopBg).display !== 'none';
      return desktopVisible ? desktopBg : mobileBg;
    }

    function syncPinnedNeon() {
      const activeBg = getActiveBg();
      const heroWidth = hero.clientWidth;
      const heroHeight = hero.clientHeight;
      const naturalWidth = activeBg.naturalWidth;
      const naturalHeight = activeBg.naturalHeight;
      if (!heroWidth || !heroHeight || !naturalWidth || !naturalHeight) return;

      const scale = Math.max(heroWidth / naturalWidth, heroHeight / naturalHeight);
      const drawnWidth = naturalWidth * scale;
      const drawnHeight = naturalHeight * scale;
      const offsetX = (heroWidth - drawnWidth) / 2;
      const offsetY = (heroHeight - drawnHeight) / 2;

      const anchor = activeBg === mobileBg ? pin.mobile : pin.desktop;
      const left = offsetX + (anchor.x * drawnWidth);
      const top = offsetY + (anchor.y * drawnHeight);
      const mobileMode = activeBg === mobileBg;
      const fontScale = mobileMode ? pin.fontScaleMobile : pin.fontScaleDesktop;
      const fontMin = mobileMode ? pin.fontMinMobile : pin.fontMinDesktop;
      const fontMax = mobileMode ? pin.fontMaxMobile : pin.fontMaxDesktop;
      let fontSize = Math.max(fontMin, Math.min(fontMax, drawnWidth * fontScale));

      neonWrapper.style.left = `${left}px`;
      neonWrapper.style.top = `${top}px`;
      neonWrapper.style.fontSize = `${fontSize}px`;
      lightSpill.style.left = `${left}px`;
      lightSpill.style.top = `${top + (pin.spillYOffset * drawnHeight)}px`;

      // Iterative shrink: keep reducing font size until sign fits shelf bounds.
      // Handles extreme browser zoom levels (150%, 250%) without clipping.
      const maxShelfWidth = drawnWidth * (mobileMode ? pin.shelfWidthMobile : pin.shelfWidthDesktop);
      const maxViewportWidth = heroWidth * (mobileMode ? 0.94 : 0.98);
      const maxShelfHeight = drawnHeight * (mobileMode ? pin.shelfHeightMobile : pin.shelfHeightDesktop);
      const HARD_MIN = 10; // allow down to 10px at extreme zoom
      for (let i = 0; i < 30; i++) {
        neonWrapper.style.fontSize = `${fontSize}px`;
        const r = neonWrapper.getBoundingClientRect();
        const widthLimit = Math.min(maxShelfWidth, maxViewportWidth);
        if (r.width <= widthLimit && r.height <= maxShelfHeight) break;
        const shrink = Math.min(widthLimit / r.width, maxShelfHeight / r.height);
        const next = Math.max(HARD_MIN, fontSize * shrink * 0.97); // 3% safety margin
        if (next === fontSize) break; // can't shrink further
        fontSize = next;
      }
      neonWrapper.style.fontSize = `${fontSize}px`;

    }

    function openLightbox(event) {
      event.preventDefault();
      openPasswordGate();
    }

    function showLightbox() {
      lightbox.classList.add('is-open');
      lightbox.setAttribute('aria-hidden', 'false');
      frame.src = embedUrl;
      soundToggle.classList.add('is-hidden');
      ambientAudio.pause();
    }

    function openPasswordGate() {
      pwModal.classList.add('is-open');
      pwModal.setAttribute('aria-hidden', 'false');
      pwLine.classList.remove('is-loading');
      pwLine.textContent = '';
      playTypingSfx();
      typePasswordLine('SEKRET PW: callshel', 320, () => {
        stopTypingSfx();
        window.setTimeout(() => {
          playLoadingDots(8, 240, () => {
            playCompleteSfx();
            window.setTimeout(() => {
              pwModal.classList.remove('is-open');
              pwModal.setAttribute('aria-hidden', 'true');
              pwLine.classList.remove('is-loading');
              showLightbox();
            }, 2400);
          });
        }, 1500);
      });
    }

    function typePasswordLine(text, speed, done) {
      let i = 0;
      const tick = () => {
        pwLine.textContent = text.slice(0, i);
        i += 1;
        if (i <= text.length) {
          typingTimer = window.setTimeout(tick, speed);
        } else if (done) {
          done();
        }
      };
      tick();
    }

    function playLoadingDots(totalDots, speed, done) {
      let i = 0;
      pwLine.textContent = '';
      pwLine.classList.add('is-loading');
      const tick = () => {
        pwLine.textContent += '.';
        i += 1;
        if (i < totalDots) {
          typingTimer = window.setTimeout(tick, speed);
        } else if (done) {
          done();
        }
      };
      tick();
    }

    function syncSoundButton() {
      soundToggle.textContent = soundEnabled ? 'SOUND ON' : 'SOUND OFF';
      soundToggle.setAttribute('aria-pressed', soundEnabled ? 'true' : 'false');
      soundToggle.classList.toggle('is-on', soundEnabled);
      soundToggle.classList.toggle('is-off', !soundEnabled);
    }

    function primeAmbient() {
      if (ambientPrimed || !soundEnabled) return;
      ambientPrimed = true;
      ambientAudio.volume = 0.32;
      ambientAudio.play().catch(() => {
        ambientPrimed = false;
      });
    }

    function playTypingSfx() {
      if (!soundEnabled) return;
      typingAudio.currentTime = 0;
      typingAudio.volume = 0.75;
      typingAudio.play().catch(() => {});
    }

    function stopTypingSfx() {
      typingAudio.pause();
      typingAudio.currentTime = 0;
    }

    function playCompleteSfx() {
      if (!soundEnabled) return;
      completeAudio.currentTime = 0;
      completeAudio.volume = 0.9;
      completeAudio.play().catch(() => {});
    }

    function playClickSfx() {
      if (!soundEnabled) return;
      if (clickSfxTimer) window.clearTimeout(clickSfxTimer);
      clickAudio.currentTime = 0;
      clickAudio.volume = 0.85;
      clickAudio.play().catch(() => {});
      clickSfxTimer = window.setTimeout(() => {
        clickAudio.pause();
        clickAudio.currentTime = 0;
      }, 2000);
    }

    function startSwellSfx() {
      if (!soundEnabled) return;
      // Restart swell on each hover/focus so the cue is always noticeable.
      if (!swellAudio.paused) {
        swellAudio.pause();
      }
      swellAudio.currentTime = 0;
      swellAudio.volume = 0.75;
      swellAudio.play().catch(() => {});
    }

    function stopSwellSfx() {
      swellAudio.pause();
      swellAudio.currentTime = 0;
    }

    function playFluorescentSfx() {
      if (!soundEnabled) return;
      fluorescentAudio.currentTime = 0;
      fluorescentAudio.volume = 0.58;
      fluorescentAudio.play().catch(() => {});
    }

    function stopFluorescentSfx() {
      fluorescentAudio.pause();
      fluorescentAudio.currentTime = 0;
    }

    function seedNeonCharacters() {
      const fill = trigger.querySelector('.neon-fill');
      const outline = trigger.querySelector('.neon-outline');
      if (!fill || !outline) return;
      const text = fill.textContent || 'PLAY TRAILER';
      const render = (node) => {
        node.textContent = '';
        [...text].forEach((ch, idx) => {
          const span = document.createElement('span');
          span.className = ch === ' ' ? 'char char-space' : 'char';
          span.dataset.idx = String(idx);
          span.textContent = ch === ' ' ? '\u00A0' : ch;
          node.appendChild(span);
        });
      };
      render(fill);
      render(outline);
    }

    function clearNeonFlicker() {
      trigger.querySelectorAll('.char.is-flicker-off').forEach((el) => el.classList.remove('is-flicker-off'));
    }

    function runNeonDropoutLoop() {
      if (!flickerActive) return;
      const chars = Array.from(trigger.querySelectorAll('.char')).filter((el) => !el.classList.contains('char-space'));
      if (!chars.length) return;
      clearNeonFlicker();

      // Fixed dropout letters so text reads: "PAY TAIL"
      // "PLAY TRAILER" indexes: P0 L1 A2 Y3 _4 T5 R6 A7 I8 L9 E10 R11
      const picks = new Set([1, 6, 10, 11]);

      trigger.querySelectorAll('.char').forEach((el) => {
        const idx = Number(el.dataset.idx || '-1');
        if (picks.has(idx)) el.classList.add('is-flicker-off');
      });

      const offDurationMs = 1800 + Math.floor(Math.random() * 1700); // 1.8s - 3.5s off
      window.setTimeout(() => {
        clearNeonFlicker();
        if (!flickerActive) return;
        const onBeatMs = 900 + Math.floor(Math.random() * 1600); // 0.9s - 2.5s on
        flickerTimer = window.setTimeout(runNeonDropoutLoop, onBeatMs);
      }, offDurationMs);
    }

    function startNeonFlicker() {
      flickerActive = true;
      runNeonDropoutLoop();
    }

    function stopNeonFlicker() {
      flickerActive = false;
      if (flickerTimer) window.clearTimeout(flickerTimer);
      flickerTimer = null;
      clearNeonFlicker();
    }

    function setCtaPush(on) {
      hero.classList.toggle('cta-push', on);
    }

    function scheduleGlitchBurst() {
      if (glitchTimer) window.clearTimeout(glitchTimer);
      const nextMs = 10000 + Math.floor(Math.random() * 10000); // 10-20s
      glitchTimer = window.setTimeout(() => {
        triggerGlitchBurst();
        scheduleGlitchBurst();
      }, nextMs);
    }

    function triggerGlitchBurst() {
      glitchVideo.classList.add('is-active');
      glitchVideo.currentTime = 0;
      glitchVideo.play().catch(() => {});
      if (soundEnabled) {
        glitchBurstAudio.currentTime = 0;
        glitchBurstAudio.volume = 0.55;
        glitchBurstAudio.play().catch(() => {});
      }
      window.setTimeout(() => {
        glitchVideo.pause();
        glitchVideo.currentTime = 0;
        glitchVideo.classList.remove('is-active');
        glitchBurstAudio.pause();
        glitchBurstAudio.currentTime = 0;
      }, 180);
    }

    function closeLightbox() {
      lightbox.classList.remove('is-open');
      lightbox.setAttribute('aria-hidden', 'true');
      frame.src = '';
      soundToggle.classList.remove('is-hidden');
      if (soundEnabled) primeAmbient();
    }

    function openSillyMode() {
      if (lightbox.classList.contains('is-open')) closeLightbox();
      sillyOverlay.classList.add('is-open');
      sillyOverlay.setAttribute('aria-hidden', 'false');
    }

    function closeSillyMode() {
      sillyOverlay.classList.remove('is-open');
      sillyOverlay.setAttribute('aria-hidden', 'true');
    }

    trigger.addEventListener('click', openLightbox);
    trigger.addEventListener('pointerenter', () => {
      trigger.classList.add('glow-on');
      startSwellSfx();
      playFluorescentSfx();
      startNeonFlicker();
      setCtaPush(true);
    });
    trigger.addEventListener('pointerleave', () => {
      trigger.classList.remove('glow-on');
      stopSwellSfx();
      stopFluorescentSfx();
      stopNeonFlicker();
      setCtaPush(false);
    });
    trigger.addEventListener('focus', () => {
      trigger.classList.add('glow-on');
      startSwellSfx();
      playFluorescentSfx();
      startNeonFlicker();
      setCtaPush(true);
    });
    trigger.addEventListener('blur', () => {
      trigger.classList.remove('glow-on');
      stopSwellSfx();
      stopFluorescentSfx();
      stopNeonFlicker();
      setCtaPush(false);
    });
    trigger.addEventListener('touchstart', () => {
      trigger.classList.add('glow-on');
      playFluorescentSfx();
      startNeonFlicker();
      setCtaPush(true);
      window.setTimeout(() => {
        trigger.classList.remove('glow-on');
        stopFluorescentSfx();
        stopNeonFlicker();
      }, 900);
      window.setTimeout(() => setCtaPush(false), 920);
    }, { passive: true });
    trigger.addEventListener('click', () => {
      playClickSfx();
      stopSwellSfx();
      stopFluorescentSfx();
      stopNeonFlicker();
      setCtaPush(false);
    });
    closeButton.addEventListener('click', closeLightbox);
    sillyExit.addEventListener('click', closeSillyMode);
    soundToggle.addEventListener('click', () => {
      soundEnabled = !soundEnabled;
      if (!soundEnabled) {
        ambientAudio.pause();
        stopTypingSfx();
        stopFluorescentSfx();
      } else {
        primeAmbient();
      }
      syncSoundButton();
    });
    // Attempt autoplay immediately; browsers may require interaction, so keep interaction fallback.
    primeAmbient();
    document.addEventListener('pointerdown', primeAmbient, { once: true, passive: true });
    document.addEventListener('keydown', primeAmbient, { once: true });
    window.addEventListener('resize', syncPinnedNeon);
    window.addEventListener('orientationchange', syncPinnedNeon);
    desktopBg.addEventListener('load', syncPinnedNeon);
    mobileBg.addEventListener('load', syncPinnedNeon);
    new ResizeObserver(syncPinnedNeon).observe(hero);

    lightbox.addEventListener('click', (event) => {
      if (event.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (event) => {
      if (event.key === 'Escape' && lightbox.classList.contains('is-open')) {
        closeLightbox();
      }

      if (event.key === 'Escape' && sillyOverlay.classList.contains('is-open')) {
        closeSillyMode();
      }
    });

    seedNeonCharacters();
    syncPinnedNeon();
    syncSoundButton();
    scheduleGlitchBurst();
  </script>
</body>

</html>
